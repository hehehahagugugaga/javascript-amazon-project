<!DOCTYPE html>
<html>
  <head>
    <title>Amazon Project</title>

    <!-- This code is needed for responsive design to work.
      (Responsive design = make the website look good on
      smaller screen sizes like a phone or a tablet). -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Load a font called Roboto from Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Here are the CSS files for this page. -->
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/amazon-header.css">
    <link rel="stylesheet" href="styles/pages/amazon.css">
  </head>
  <body>
    <div class="amazon-header">
      <div class="amazon-header-left-section">
        <a href="amazon.html" class="header-link">
          <img class="amazon-logo"
            src="images/amazon-logo-white.png">
          <img class="amazon-mobile-logo"
            src="images/amazon-mobile-logo-white.png">
        </a>
      </div>

      <div class="amazon-header-middle-section">
        <input class="search-bar" type="text" placeholder="Search">

        <button class="search-button">
          <img class="search-icon" src="images/icons/search-icon.png">
        </button>
      </div>

      <div class="amazon-header-right-section">
        <a class="orders-link header-link" href="orders.html">
          <span class="returns-text">Returns</span>
          <span class="orders-text">& Orders</span>
        </a>

        <a class="cart-link header-link" href="checkout.html">
          <img class="cart-icon" src="images/icons/cart-icon.png">
          <div class="cart-quantity">0</div>
          <div class="cart-text">Cart</div>
        </a>
      </div>
    </div>
    
  
    <div class="main">
      <div class="products-grid">
      </div>
    </div>
  </body>
  <script>
    let cart=[
      {
        image:"images/products/athletic-cotton-socks-6-pairs.jpg",
        name: "Black and Gray Athletic Cotton Socks - 6 Pairs",
        price: 1090,
        quantity: 1,
        stars:"images/ratings/rating-45.png",
        ratingCount:87,
      },
      {
        image:"images/products/intermediate-composite-basketball.jpg",
        name: "Intermediate Size Basketball",
        price: 2095,
        quantity: 1,
        stars:"images/ratings/rating-40.png",
        ratingCount:127,
      },
      {
        image:"images/products/adults-plain-cotton-tshirt-2-pack-teal.jpg",
        name: "Adults Plain Cotton T-Shirt - 2 Pack",
        price: 799,
        quantity: 1,
        stars:"images/ratings/rating-45.png",
        ratingCount:56,
      }
    ];
    let mainHTML='';
    cart.forEach((item)=>{
      mainHTML+=
      `<div class="product-container">
        <div class="product-image-container">
          <img class="product-image"
            src=${item.image}>
        </div>

        <div class="product-name limit-text-to-2-lines">
          ${item.name}
        </div>

        <div class="product-rating-container">
          <img class="product-rating-stars"
            src=${item.stars}>
          <div class="product-rating-count link-primary">
            ${item.ratingCount}
          </div>
        </div>

        <div class="product-price">
          $${(item.price / 100).toFixed(2)}
        </div>

        <div class="product-quantity-container">
          <select>
            ${options()}
          </select>
        </div>

        <div class="product-spacer"></div>

        <div class="added-to-cart">
          <img src="images/icons/checkmark.png">
          Added
        </div>

        <button style="height:40px;" class="js-add-to-cart-button button-primary" onclick="addto(${item.ratingCount})">
          Add to Cart
        </button>
      </div>`;
       
    
    document.querySelector(".products-grid").innerHTML=mainHTML
     });
    let cq=0;
    let checkout=[];
    function addto(ratingCount){
      let cq=Number(document.querySelector(".cart-quantity").innerHTML);
      cq++;
      document.querySelector(".cart-quantity").innerHTML=cq;
      item=cart.find((item)=>item.ratingCount===ratingCount);
      console.log(item.name);
      checkout=[{
        name:item.name,
        price:item.price, 
        quantity:item.quantity,
        image:item.image,
      }];
    };
    export {checkout};
    
    function options(){
      let option="";
      for(let i=1;i<=10;i++){
        option+=`<option value=${i}>${i}</option>`;
      }
      return option;
    }
  </script>
</html>
